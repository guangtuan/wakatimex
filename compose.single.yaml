# 单服务模式：仅启动 app，MySQL 使用宿主机已有实例。
#
# 使用前提：
#   1. 宿主机 MySQL 已创建数据库，并执行过 ddl/init.sql 完成建表。
#   2. 复制 .env.example 为 .env，按实际情况修改配置（尤其是 MYSQL_DSN）。
#      host.docker.internal 由 extra_hosts 注入，指向宿主机 127.0.0.1。
#      示例：MYSQL_DSN=mysql://root:yourpassword@host.docker.internal:3306/wakatime_sync
#
# 启动命令：
#   docker compose -f compose.single.yaml up --build -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "0.0.0-dev"
    container_name: wakatime-sync-dev
    ports:
      - "9506:9506"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_PORT: ${APP_PORT:-9506}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      MYSQL_DSN: ${MYSQL_DSN}
      WAKATIME_API_BASE: ${WAKATIME_API_BASE:-https://api.wakatime.com/api/v1}
    volumes:
      - ${HOME}/.wakatime.cfg:/root/.wakatime.cfg:ro
    command:
      [
        "uvicorn",
        "wakatime_sync.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "9506"
      ]
