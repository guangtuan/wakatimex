services:
  mysql:
    image: mysql:8.0
    container_name: wakatime-sync-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: wakatime_sync
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "0.0.0-dev"
    container_name: wakatime-sync-dev
    ports:
      - "9506:9506"
    environment:
      APP_ENV: dev
      APP_PORT: 9506
      APP_TIMEZONE: UTC
      MYSQL_DSN: mysql://root:123456@mysql:3306/wakatime_sync
      WAKATIME_API_BASE: https://api.wakatime.com/api/v1
    volumes:
      - ${HOME}/.wakatime.cfg:/root/.wakatime.cfg:ro
    depends_on:
      mysql:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "wakatime_sync.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "9506"
      ]

volumes:
  mysql_data:
