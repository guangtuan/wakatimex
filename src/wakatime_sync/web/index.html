<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WakaTime Activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="home">
    <div class="app">
      <nav class="navbar">
        <div class="nav-brand">
          <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="56" height="56" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
            <rect x="14" y="14" width="10" height="10" rx="3" fill="#ebedf0"/>
            <rect x="27" y="14" width="10" height="10" rx="3" fill="#9be9a8"/>
            <rect x="40" y="14" width="10" height="10" rx="3" fill="#40c463"/>
            <rect x="14" y="27" width="10" height="10" rx="3" fill="#9be9a8"/>
            <rect x="27" y="27" width="10" height="10" rx="3" fill="#30a14e"/>
            <rect x="40" y="27" width="10" height="10" rx="3" fill="#216e39"/>
            <rect x="14" y="40" width="10" height="10" rx="3" fill="#ebedf0"/>
            <rect x="27" y="40" width="10" height="10" rx="3" fill="#40c463"/>
            <rect x="40" y="40" width="10" height="10" rx="3" fill="#30a14e"/>
          </svg>
          <span class="brand-text">WakaTimeX</span>
          <span class="brand-version" id="version">v?.?.?</span>
        </div>
        <div class="nav-meta">
          <div class="page-nav" aria-label="Page navigation">
            <a class="page-nav-link is-active" href="/index.html" data-i18n="page.home">Home</a>
            <a class="page-nav-link" href="/chart.html" data-i18n="page.charts">Charts</a>
          </div>
          <div id="lang-switch" class="lang-switch" role="group" aria-label="Language switch">
            <button id="lang-en-btn" class="lang-btn" type="button" data-lang="en">EN</button>
            <button id="lang-zh-btn" class="lang-btn" type="button" data-lang="zh">中</button>
          </div>
          <div class="nav-sync-group">
            <div class="nav-sync-range">
              <label class="sync-range-field">
                <span class="sync-range-label" data-i18n="sync.from">From</span>
                <input id="sync-start-date" class="sync-date-input" type="date" />
              </label>
              <label class="sync-range-field">
                <span class="sync-range-label" data-i18n="sync.to">To</span>
                <input id="sync-end-date" class="sync-date-input" type="date" />
              </label>
              <button id="sync-range-btn" class="nav-sync-btn primary" type="button">
                <span data-i18n="sync.run_range">Sync</span>
              </button>
            </div>
          </div>
          <span class="sync-badge" id="last-sync">loading...</span>
        </div>
      </nav>

      <main class="dashboard">
        <section class="charts-section">
          <div class="chart-container large">
            <div class="chart-header calendar-header">
              <div class="calendar-header-title" data-i18n="calendar.title">Monthly Coding Calendar</div>
              <div class="chart-actions month-nav">
                <button id="prev-month-btn" class="month-nav-btn" type="button" aria-label="Previous month">←</button>
                <span id="calendar-month-label" class="month-label">Current Month</span>
                <button id="next-month-btn" class="month-nav-btn" type="button" aria-label="Next month">→</button>
                <button id="today-btn" class="month-nav-btn today-btn" type="button" data-i18n="calendar.today">Today</button>
              </div>
              <div class="calendar-header-overview-group">
                <div class="stats-overview calendar-stats-overview">
                  <div class="stat-card compact">
                    <div class="stat-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                      </svg>
                    </div>
                    <div class="stat-content">
                      <span class="stat-value" id="week-active">-</span>
                    </div>
                  </div>
                  <div class="stat-card compact stat-card-inline-detail">
                    <div class="stat-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 21h8"/>
                        <path d="M12 17v4"/>
                        <path d="M7 4h10v3a5 5 0 0 1-10 0V4z"/>
                        <path d="M7 6H5a2 2 0 0 0 2 2"/>
                        <path d="M17 6h2a2 2 0 0 1-2 2"/>
                      </svg>
                    </div>
                    <div class="stat-content">
                      <span class="stat-value" id="best-day">-</span>
                    </div>
                  </div>
                  <div class="stat-card compact">
                    <div class="stat-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20V10"/>
                        <path d="M18 20V4"/>
                        <path d="M6 20v-4"/>
                      </svg>
                    </div>
                    <div class="stat-content">
                      <span class="stat-value" id="total-heartbeats">-</span>
                    </div>
                  </div>
                  <div class="stat-card compact stat-card-prev-month" id="prev-month-card" style="display:none">
                    <div class="stat-icon">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                        <polyline points="17 6 23 6 23 12"/>
                      </svg>
                    </div>
                    <div class="stat-content">
                      <span class="stat-value" id="prev-month-hours">-</span>
                      <span class="stat-detail stat-delta" id="prev-month-delta"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div id="calendar-chart-body" class="chart-body calendar-chart-body">
              <div class="calendar-layout">
                <div class="calendar-main">
                  <div class="calendar-weekdays" aria-hidden="true">
                    <span data-i18n="weekday.mon">Mon</span>
                    <span data-i18n="weekday.tue">Tue</span>
                    <span data-i18n="weekday.wed">Wed</span>
                    <span data-i18n="weekday.thu">Thu</span>
                    <span data-i18n="weekday.fri">Fri</span>
                    <span data-i18n="weekday.sat">Sat</span>
                    <span data-i18n="weekday.sun">Sun</span>
                  </div>
                  <div id="daily-calendar-grid" class="calendar-grid"></div>
                  <div class="calendar-legend" aria-hidden="true">
                    <span class="calendar-legend-label" data-i18n="calendar.less">Less</span>
                    <span class="calendar-legend-swatch level-0"></span>
                    <span class="calendar-legend-swatch level-1"></span>
                    <span class="calendar-legend-swatch level-2"></span>
                    <span class="calendar-legend-swatch level-3"></span>
                    <span class="calendar-legend-swatch level-4"></span>
                    <span class="calendar-legend-label" data-i18n="calendar.more">More</span>
                  </div>
                </div>
                <div class="calendar-side-panels">
                  <aside id="calendar-side-panel" class="calendar-side-panel is-empty">
                    <div class="calendar-hover-header">
                      <div>
                        <div class="calendar-hover-eyebrow" data-i18n="calendar.selected_day">Selected Day</div>
                        <h3 id="calendar-hover-title" data-i18n="calendar.select_day">Select a day</h3>
                      </div>
                      <div id="calendar-hover-summary" class="calendar-hover-summary" data-i18n="calendar.click_date">Click a date to view breakdowns</div>
                    </div>
                    <div class="calendar-hover-grid">
                      <section class="calendar-hover-section">
                        <h4 data-i18n="sections.languages">Languages</h4>
                        <div id="calendar-hover-languages" class="calendar-hover-list"></div>
                      </section>
                      <section class="calendar-hover-section">
                        <h4 data-i18n="sections.projects">Projects</h4>
                        <div id="calendar-hover-projects" class="calendar-hover-list"></div>
                      </section>
                    </div>
                  </aside>
                  <aside id="calendar-hourly-panel" class="calendar-side-panel calendar-hourly-panel is-empty">
                    <div class="calendar-hourly-header">
                      <div class="calendar-hover-eyebrow" data-i18n="calendar.hourly_distribution">24h Distribution</div>
                      <div id="calendar-hourly-summary" class="calendar-hover-summary calendar-hourly-summary" data-i18n="calendar.hourly_click_date">Click a date to view hourly activity</div>
                    </div>
                    <div id="calendar-hourly-list" class="calendar-hourly-list"></div>
                  </aside>
                </div>
              </div>
            </div>
          </div>

        </section>

      </main>

      <footer class="footer">
        <p data-i18n="footer.copy">WakaTime Sync Dashboard © 2025</p>
      </footer>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
